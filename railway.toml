# Railway config-as-code — https://docs.railway.com/config-as-code
# One-click deploy: README → "Deploy to Railway" (see docs/railway-template.md)
# Also set on the app service: PORT=3000, HOSTNAME=:: (tunnel origin uses :3000)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
