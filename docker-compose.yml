# Local Docker stack — not for public internet. Use docker-compose.tunnel.yml for production.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: open_splitwise
      POSTGRES_PASSWORD: open_splitwise
      POSTGRES_DB: open_splitwise
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_splitwise -d open_splitwise"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://open_splitwise:open_splitwise@postgres:5432/open_splitwise
      SESSION_SECRET: ${SESSION_SECRET:-showcase-deploy-only-32chars-min!!!}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      SPLITWISE_CLIENT_ID: ${SPLITWISE_CLIENT_ID:-}
      SPLITWISE_CLIENT_SECRET: ${SPLITWISE_CLIENT_SECRET:-}
      SPLITWISE_REDIRECT_URI: ${SPLITWISE_REDIRECT_URI:-http://localhost:3000/api/auth/splitwise/callback}

volumes:
  postgres_data:
