<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    :root {
      color-scheme: light dark;
    }
    .bg {
      fill: #0d9488;
    }
    .fg {
      fill: #ffffff;
    }
    .slit {
      stroke: #0d9488;
    }
    @media (prefers-color-scheme: dark) {
      .bg {
        fill: #2dd4bf;
      }
      .fg {
        fill: #042f2e;
      }
