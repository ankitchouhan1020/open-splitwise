  </style>
  <rect width="32" height="32" rx="8" class="bg" />
  <path d="M16 7 25 16 16 25 7 16" class="fg" />
  <path d="M16 7 25 16 16 25 16 16" class="bg" opacity="0.28" />
  <path
    d="M11 10 21 22"
